name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: nightly

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Run tests
        shell: bash
        run: |
          set +e
          just test 2>&1 | tee "$RUNNER_TEMP/test-output.log"
          status=${PIPESTATUS[0]}

          {
            echo '## Test output'
            echo
            echo '```text'
            cat "$RUNNER_TEMP/test-output.log"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$status"
